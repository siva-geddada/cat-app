<div class="container">
  <div class="header">
    <h1>❤️ My Favorite Cats</h1>
    <p class="subtitle">Your collection of loved cats</p>
  </div>

  <div class="cats-grid">
    @if (cats().length === 0) {
      <div class="empty-state">
        <mat-icon class="empty-icon">favorite_border</mat-icon>
        <p>No favorites yet. Mark some cats as favorites!</p>
      </div>
    } @else {
      @for (cat of cats(); track cat.id) {
        <mat-card class="cat-card">
          <div class="cat-content">
            <h3>{{ cat.name }}</h3>
            <p class="age"><strong>Age:</strong> {{ cat.age }}</p>
            <p class="description">{{ cat.description }}</p>
          </div>
          <div class="cat-actions">
            <a [routerLink]="['/cat', cat.id]" mat-button color="accent">
              View & Edit
            </a>
            <button
              mat-icon-button
              color="warn"
              (click)="onRemoveFavorite(cat.id)">
              <mat-icon>favorite</mat-icon>
            </button>
          </div>
        </mat-card>
      }
    }
  </div>
</div>
