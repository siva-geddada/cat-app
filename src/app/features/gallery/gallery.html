<div class="container">
  <div class="header">
    <h1>🖼️ Gallery</h1>
    <p class="subtitle">Browse all available cats</p>
  </div>

  @if (isLoading()) {
    <div class="loading">
      <mat-spinner></mat-spinner>
      <p>Loading gallery...</p>
    </div>
  } @else {
    <div class="cats-grid">
      @for (cat of cats(); track cat.id) {
        <mat-card class="cat-card">
          @if (cat.imageUrl) {
            <img [src]="cat.imageUrl" [alt]="cat.info.name" class="cat-image" />
          } @else {
            <div class="cat-image placeholder">
              <mat-icon>pets</mat-icon>
            </div>
          }
          <div class="cat-content">
            <h3>{{ cat.info.name }}</h3>
            <p class="age"><strong>Age:</strong> {{ cat.info.age }}</p>
            <p class="description">{{ cat.info.description }}</p>
          </div>
          <div class="cat-actions">
            <a [routerLink]="['/cat', cat.id]" mat-button color="accent">
              Edit
            </a>
            <button
              mat-icon-button
              [color]="isFavorited(cat.id) ? 'warn' : ''"
              (click)="toggleFavorite(cat.id)"
              matTooltip="Add to favorites">
              <mat-icon>{{ isFavorited(cat.id) ? 'favorite' : 'favorite_border' }}</mat-icon>
            </button>
          </div>
        </mat-card>
      }
    </div>
  }
</div>
