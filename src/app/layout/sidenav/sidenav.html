<aside class="sidenav" [class.open]="isOpen()">
  <p class="nav-section-label">Navigation</p>
  <nav class="nav-menu">
    <a (click)="closeSidenav()" routerLink="/" routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </a>
    <a (click)="closeSidenav()" routerLink="/breeds" routerLinkActive="active" class="nav-link">
      <mat-icon>pets</mat-icon>
      <span>Breeds</span>
    </a>
    <a (click)="closeSidenav()" routerLink="/gallery" routerLinkActive="active" class="nav-link">
      <mat-icon>collections</mat-icon>
      <span>Gallery</span>
    </a>
    <a (click)="closeSidenav()" routerLink="/favorites" routerLinkActive="active" class="nav-link">
      <mat-icon>favorite</mat-icon>
      <span>Favorites</span>
    </a>
    <a (click)="closeSidenav()" routerLink="/match" routerLinkActive="active" class="nav-link">
      <mat-icon>auto_awesome</mat-icon>
      <span>Cat Match</span>
    </a>
  </nav>
</aside>
