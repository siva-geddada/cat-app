<div class="app-layout">
  <app-sidenav></app-sidenav>

  <div class="content-shell">

    <!-- Glass top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="mobile-menu-btn" (click)="toggleSidenav()">
          <mat-icon>menu</mat-icon>
        </button>
        <div class="search-box">
          <mat-icon class="search-icon">search</mat-icon>
          <input type="text" placeholder="Search cats…" class="search-input" />
        </div>
      </div>
      <div class="top-bar-right">
        <button class="icon-btn">
          <mat-icon>favorite_border</mat-icon>
        </button>
        <div class="avatar-chip">🐾</div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet></router-outlet>

      <!-- Footer -->
      <footer class="app-footer">
        <div class="footer-inner">
          <div class="footer-brand">
            <span class="footer-logo">🐱</span>
            <div>
              <p class="footer-brand-name">Cat Explorer</p>
              <p class="footer-brand-desc">Your premium destination for celebrating the beauty of cats. Powered by feline experts and data enthusiasts.</p>
            </div>
          </div>
          <div class="footer-links">
            <p class="footer-links-title">Quick Links</p>
            <a routerLink="/">Home</a>
            <a routerLink="/breeds">Breeds</a>
            <a routerLink="/gallery">Gallery</a>
            <a routerLink="/favorites">Favourites</a>
            <a routerLink="/match">Cat Match</a>
          </div>
          <div class="footer-social">
            <p class="footer-links-title">Stay Connected</p>
            <div class="footer-social-btns">
              <button class="social-btn"><mat-icon>share</mat-icon></button>
              <button class="social-btn"><mat-icon>alternate_email</mat-icon></button>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <p>© 2024 Cat Explorer. All rights reserved.</p>
        </div>
      </footer>
    </main>

  </div>
</div>
